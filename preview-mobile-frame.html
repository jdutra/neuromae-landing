<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Preview Mobile — NeuroMãe Hero</title>
<style>
  body{margin:0;background:#1a1410;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#cdbfb2;display:flex;flex-direction:column;align-items:center;padding:32px 16px 80px;min-height:100vh}
  h1{font-family:"Playfair Display",Georgia,serif;font-weight:500;color:#cfa77e;font-size:22px;margin:0 0 6px;letter-spacing:.04em}
  p.sub{margin:0 0 28px;font-size:13px;color:rgba(231,217,204,.72);letter-spacing:.04em}
  .row{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;align-items:flex-start}
  .device{display:flex;flex-direction:column;align-items:center;gap:14px}
  .device-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(231,217,204,.55);font-weight:600}
  .frame{position:relative;border-radius:42px;background:#000;padding:14px 6px;box-shadow:0 28px 70px rgba(0,0,0,.55),0 0 0 2px rgba(255,255,255,.05) inset}
  .frame.phone{width:392px}
  .frame.phone iframe{width:380px;height:812px;border:0;border-radius:30px;background:#1a1410;display:block}
  .frame.tablet{width:780px;padding:18px 10px;border-radius:32px}
  .frame.tablet iframe{width:760px;height:560px;border:0;border-radius:18px;background:#1a1410;display:block}
  .frame.desktop{width:1280px;padding:18px 10px;border-radius:18px}
  .frame.desktop iframe{width:1260px;height:740px;border:0;border-radius:8px;background:#1a1410;display:block}
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:120px;height:24px;background:#000;border-radius:0 0 16px 16px;z-index:2}
</style>
</head>
<body>
  <h1>Preview multi-dispositivo</h1>
  <p class="sub">o mesmo HTML em três larguras — pra você ver os breakpoints em ação</p>
  <div class="row">

    <div class="device">
      <span class="device-label">Mobile · 380px</span>
      <div class="frame phone">
        <div class="notch"></div>
        <iframe src="./preview-hero-abraco.html" title="mobile preview"></iframe>
      </div>
    </div>

    <div class="device">
      <span class="device-label">Tablet · 760px</span>
      <div class="frame tablet">
        <iframe src="./preview-hero-abraco.html" title="tablet preview"></iframe>
      </div>
    </div>

    <div class="device">
      <span class="device-label">Desktop · 1260px</span>
      <div class="frame desktop">
        <iframe src="./preview-hero-abraco.html" title="desktop preview"></iframe>
      </div>
    </div>

  </div>
</body>
</html>
