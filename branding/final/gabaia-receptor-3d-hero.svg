<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>GABAIA — Receptor GABA-A 3D ilustrado (asset de marketing)</title>
  <desc>Ilustração com sensação 3D do receptor GABA-A: 5 subunidades com volume, canal central como poro profundo, moléculas GABA se aproximando, íons Cl⁻ no canal. Pra hero da landing, slides de pitch, posts educativos. NÃO É O LOGO — é asset narrativo.</desc>

