    <radialGradient id="grad-beta" cx="0.4" cy="0.3" r="0.85"><stop offset="0%" stop-color="#CCD5C4"/><stop offset="55%" stop-color="#A8B5A2"/><stop offset="100%" stop-color="#7B8A75"/></radialGradient>
