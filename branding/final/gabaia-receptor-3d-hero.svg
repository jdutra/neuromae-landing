    <radialGradient id="grad-pore" cx="0.5" cy="0.5" r="0.8"><stop offset="0%" stop-color="#3A2D24"/><stop offset="60%" stop-color="#5A4538"/><stop offset="100%" stop-color="#8B7565"/></radialGradient>
    <radialGradient id="grad-halo" cx="0.5" cy="0.5" r="0.6"><stop offset="0%" stop-color="#EFE7DD" stop-opacity="0"/><stop offset="70%" stop-color="#EFE7DD" stop-opacity="0"/><stop offset="90%" stop-color="#D8C9B2" stop-opacity="0.35"/><stop offset="100%" stop-color="#C9B7A6" stop-opacity="0"/></radialGradient>
