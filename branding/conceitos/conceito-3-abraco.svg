<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>GABAIA — Conceito 3: Abraço (duas curvas que se aninham)</title>
  <desc>Duas curvas em forma de U invertido (uma rosa, uma sage) que se sobrepõem como um abraço, formando um ninho/proteção. Mais abstrato, mais geométrico, ótimo pra escala pequena.</desc>
  <!-- Arco rosa (camada externa, abraço maior) -->
  <path d="M 30,160
           C 30,90 60,40 100,40
           C 140,40 170,90 170,160
           L 145,160
           C 145,105 125,68 100,68
           C 75,68 55,105 55,160 Z"
        fill="#D8A7A1"/>
  <!-- Arco sage (interno, abraço menor / coração) -->
  <path d="M 65,160
           C 65,115 80,80 100,80
           C 120,80 135,115 135,160
           L 118,160
           C 118,128 110,103 100,103
           C 90,103 82,128 82,160 Z"
        fill="#A8B5A2"/>
</svg>
