<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GABAIA — preview mobile</title>
<style>
  :root{
    --cream:#F4EDE5;--ink:#3F352F;--brown:#5E4A3E;--muted:#7B6C61;--olive2:#526143;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 90% 10%,rgba(190,117,100,.18),transparent 35%),
      radial-gradient(circle at 10% 90%,rgba(168,181,162,.18),transparent 35%),
      var(--cream);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px 60px;
    gap:24px;
  }
  .header{
    text-align:center;
    max-width:560px;
  }
  .header h1{
    font-family:'Playfair Display',Georgia,serif;
    font-size:24px;
    margin:0 0 6px;
    color:var(--brown);
    font-weight:500;
    letter-spacing:-.02em;
  }
  .header p{
    margin:0;
    font-size:14px;
    color:var(--muted);
  }
  .controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .controls button{
    appearance:none;
    border:1px solid rgba(95,75,62,.18);
    background:rgba(255,252,247,.7);
    color:var(--brown);
    padding:8px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.04em;
    cursor:pointer;
    transition:.18s;
  }
  .controls button:hover{transform:translateY(-1px)}
  .controls button.active{
    background:var(--olive2);
    color:#FFF9F2;
    border-color:var(--olive2);
  }
  .phone{
    position:relative;
    background:#1a1410;
    border-radius:46px;
    padding:14px;
    box-shadow:
      0 30px 80px rgba(40,28,20,.32),
      0 0 0 2px rgba(255,255,255,.04) inset;
    transition:width .25s ease;
  }
  .phone .notch{
    position:absolute;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
    height:24px;
    background:#1a1410;
    border-radius:0 0 16px 16px;
    z-index:2;
  }
  .phone iframe{
    display:block;
    width:100%;
    height:780px;
    border:0;
    border-radius:34px;
    background:var(--cream);
  }
  .phone[data-size="iphone-se"]{width:343px}
  .phone[data-size="iphone-13"]{width:402px}
  .phone[data-size="pixel-7"]{width:434px}
  .phone[data-size="iphone-15-pro-max"]{width:462px}
  .footer-note{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    max-width:480px;
    line-height:1.5;
  }
  .footer-note a{color:var(--olive2);font-weight:700}
  @media(max-width:520px){
    body{padding:16px 8px 40px}
    .phone{transform:scale(.85);transform-origin:top center}
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Preview mobile · GABAIA</h1>
    <p>Visualização do <code>preview-2.html</code> em diferentes tamanhos de tela.</p>
  </div>

  <div class="controls" role="tablist" aria-label="Tamanho do dispositivo">
    <button data-size="iphone-se">iPhone SE · 343px</button>
    <button data-size="iphone-13" class="active">iPhone 13 · 390px</button>
    <button data-size="pixel-7">Pixel 7 · 412px</button>
    <button data-size="iphone-15-pro-max">iPhone 15 Pro Max · 430px</button>
  </div>

  <div class="phone" data-size="iphone-13" id="phone">
    <div class="notch" aria-hidden="true"></div>
    <iframe src="./preview-2.html" title="Preview mobile da landing page GABAIA" loading="lazy"></iframe>
  </div>

  <p class="footer-note">
    Esse preview carrega o mesmo arquivo <a href="./preview-2.html" target="_blank">preview-2.html</a> dentro de um iframe travado em largura de celular — então tudo que você ajustar no original aparece aqui.
  </p>

  <script>
    const phone = document.getElementById('phone');
    const buttons = document.querySelectorAll('.controls button');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        phone.dataset.size = btn.dataset.size;
      });
    });
  </script>
</body>
</html>
